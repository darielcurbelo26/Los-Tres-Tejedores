<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Tellus (Estático)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            font-family: monospace;
        }
        #bird-container {
            width: 100%;
            height: 100%;
        }
        #info-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="bird-container"></div>

    <!-- CDN Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Application Code -->
    <script src="./tellusData.js"></script>
    <script src="./BirdViewer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new window.BirdViewer('#bird-container');
        });
    </script>
</body>
</html>
